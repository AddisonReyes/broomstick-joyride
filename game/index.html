<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <title>broomstick-joyride</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <style>
      :root {
        color-scheme: dark;
        background: #0e1128;
      }

      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #0e1128;
      }

      body {
        min-height: 100vh;
      }

      #game-root {
        width: 100vw;
        height: 100vh;
        overflow: hidden;
      }

      #game-root canvas {
        display: block;
        margin: 0 auto;
        image-rendering: pixelated;
      }

      #game-root:fullscreen {
        width: 100vw;
        height: 100vh;
      }
    </style>
  </head>
  <body>
    <div id="game-root"></div>
    <script src="src/main.ts" type="module"></script>
  </body>
</html>
